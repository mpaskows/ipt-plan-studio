. Ease in on the exhale.",dosage:{sets:2,reps:"",hold:30,freq:"1\xD7 daily"}},{id:k(),name:"Knees to Chest",effect:"stretch",style:"yoga",areas:["Low back","Hips"],muscles:["Lower back","Glutes"],videoUrl:"",description:"On your back, draw both knees toward the chest, hands behind the thighs or on the shins. Gently rock side to side if comfortable.",cues:"Let the low back round and release. Soft jaw, slow breath.",dosage:{sets:1,reps:"",hold:60,freq:"2\xD7 daily"}},{id:k(),name:"Figure-4 Piriformis Stretch",effect:"stretch",style:"yoga",bothSides:!0,areas:["Hips","Low back"],muscles:["Piriformis","Glutes","Outer hip"],videoUrl:"",description:"On your back, cross the right ankle over the left knee, then draw the left thigh in until a stretch is felt in the right outer hip. Repeat on the other side.",cues:"Keep the head and shoulders relaxed on the floor; flex the crossed foot.",dosage:{sets:1,reps:"",hold:30,freq:"1\xD7 daily"}},{id:k(),name:"Constructive Rest (Psoas Release)",effect:"stretch",style:"yoga",areas:["Low back","Hips"],muscles:["Hip flexors","Lower back"],videoUrl:"",description:"On your back with knees bent, feet flat about hip width, arms resting on the ribs or floor. Allow the hip flexors and low back to release with gravity.",cues:"Do nothing \u2014 let the floor hold you. A timer helps you stay long enough.",dosage:{sets:1,reps:"",hold:300,freq:"1\xD7 daily"}},{id:k(),name:"Cat\u2013Cow",effect:"stretch",style:"yoga",areas:["Upper back","Low back","Full body"],muscles:["Lower back","Upper back","Core"],videoUrl:"",description:"On hands and knees, alternate arching the spine toward the ceiling (cat) and releasing the belly toward the floor (cow), moving with the breath.",cues:"Exhale to round, inhale to extend. Move segment by segment.",dosage:{sets:1,reps:"10",hold:0,freq:"1\u20132\xD7 daily"}},{id:k(),name:"Child's Pose",effect:"stretch",style:"yoga",areas:["Low back","Hips","Shoulders"],muscles:["Lower back","Lats"],videoUrl:"",description:"Kneel, sit back toward the heels, and fold forward with arms extended or alongside the body. Use a bolster under the torso if needed.",cues:"Widen the knees for more room. Breathe into the back body.",dosage:{sets:1,reps:"",hold:90,freq:"as needed"}},{id:k(),name:"Sphinx Pose",effect:"stretch",style:"yoga",areas:["Low back","Upper back","Chest"],muscles:["Lower back","Chest"],videoUrl:"",description:"Lying prone, prop onto the forearms with elbows under the shoulders, letting the low back settle into gentle extension.",cues:"Legs heavy, glutes soft. Back off if there is any pinching.",dosage:{sets:1,reps:"",hold:60,freq:"1\xD7 daily"}},{id:k(),name:"Bridge Pose",effect:"strengthen",style:"yoga",areas:["Hips","Low back"],muscles:["Glutes","Hamstrings","Lower back"],videoUrl:"",description:"On your back with knees bent, press through the feet to lift the hips, hold briefly, then lower with control.",cues:"Drive evenly through both feet; keep knees tracking over toes.",dosage:{sets:2,reps:"10",hold:3,freq:"1\xD7 daily"}},{id:k(),name:"Standing Hip Flexor Stretch (Low Lunge)",effect:"stretch",style:"yoga",bothSides:!0,areas:["Hips","Low back"],muscles:["Hip flexors","Quadriceps"],videoUrl:"",description:"In a kneeling or standing lunge, tuck the pelvis slightly and shift weight forward until a stretch is felt at the front of the rear hip.",cues:"Length comes from the pelvic tuck, not from lunging deeper.",dosage:{sets:2,reps:"",hold:30,freq:"1\xD7 daily"}},{id:k(),name:"Bird Dog",effect:"strengthen",style:"yoga",bothSides:!0,areas:["Low back","Full body"],muscles:["Core","Glutes","Lower back","Shoulders"],videoUrl:"",description:"From hands and knees, extend the opposite arm and leg while keeping the trunk level, then switch sides.",cues:"Imagine balancing a cup of tea on the low back. Slow and steady.",dosage:{sets:2,reps:"8 / side",hold:3,freq:"1\xD7 daily"}},{id:k(),name:"Clamshell",effect:"strengthen",style:"yoga",bothSides:!0,areas:["Hips"],muscles:["Glutes","Outer hip"],videoUrl:"",description:"Side-lying with knees bent and feet together, lift the top knee while keeping the pelvis still, then lower with control.",cues:"Don't let the pelvis roll back; the movement is small and precise.",dosage:{sets:2,reps:"12 / side",hold:0,freq:"1\xD7 daily"}},{id:k(),name:"Tree Pose",effect:"strengthen",style:"yoga",bothSides:!0,areas:["Hips","Full body","Ankles & feet"],muscles:["Glutes","Core","Calves"],videoUrl:"",description:"Standing on one leg, place the other foot on the inner calf or thigh (not the knee), hands at heart or overhead. Repeat on the other side.",cues:"Press foot and leg into each other; fix the gaze on a steady point.",dosage:{sets:1,reps:"",hold:30,freq:"1\xD7 daily"}},{id:k(),name:"Legs Up the Wall",effect:"stretch",style:"yoga",areas:["Low back","Full body"],muscles:["Hamstrings","Lower back"],videoUrl:"",description:"Lying on your back with the legs resting vertically up a wall, arms relaxed. A folded blanket under the pelvis adds gentle support.",cues:"Settle in for several minutes; let the breath slow on its own.",dosage:{sets:1,reps:"",hold:600,freq:"as needed"}},{id:k(),name:"Easy Pose with Neck Stretch (Sukhasana)",effect:"stretch",style:"yoga",areas:["Neck","Full body"],muscles:["Neck","Upper trapezius"],videoUrl:"",description:"Seated cross-legged with a tall spine, gently tilt one ear toward the shoulder, the same-side hand lightly guiding the head; switch sides, then add slow chin-to-ceiling and chin-to-chest movements.",cues:"Guide, never pull \u2014 let the exhale lengthen the neck. Ground the sit bones; relax shoulders and jaw.",dosage:{sets:1,reps:"",hold:180,freq:""}},{id:k(),name:"Seated Cat\u2013Cow (Hands Clasped)",effect:"stretch",style:"yoga",areas:["Neck","Upper back"],muscles:["Upper back","Chest","Neck"],videoUrl:"",description:"Seated, interlace the fingers behind the head. Inhale to open the elbows wide and lift the chin; exhale to hug the elbows in, tuck the chin, and round the spine. Variation: press clasped palms forward as you round, then clasp behind the sacrum and lift the chest.",cues:"Hands cradle the head \u2014 no pulling. Move with the breath.",dosage:{sets:1,reps:"8 breaths",hold:0,freq:""}},{id:k(),name:"Seated Side Stretch",effect:"stretch",style:"yoga",areas:["Upper back","Full body"],muscles:["Obliques","Lats"],videoUrl:"",description:"Inhale both arms overhead; exhale one hand to the floor as the other arm reaches up and over into a side stretch. Alternate sides, breathing into the side ribs. Go deeper by lowering to the forearm if available.",cues:"Both sit bones stay heavy; lengthen before you lean.",dosage:{sets:1,reps:"6 breaths",hold:0,freq:""}},{id:k(),name:"Seated Forward Bow (Hands Clasped Behind)",effect:"stretch",style:"yoga",areas:["Shoulders","Upper back","Chest"],muscles:["Chest","Shoulders","Upper back"],videoUrl:"",description:"Seated, clasp the hands behind the sacrum, roll the shoulders back to open the chest, then fold gently forward, letting the arms float away from the back.",cues:"Lead with the chest; let the arms lift only as far as is comfortable.",dosage:{sets:1,reps:"",hold:30,freq:""}},{id:k(),name:"Seated Twist (Parivrtta Sukhasana)",effect:"stretch",style:"yoga",bothSides:!0,areas:["Upper back","Low back"],muscles:["Obliques","Lower back","Upper back"],videoUrl:"",description:"Inhale the arms overhead; exhale one hand to the opposite knee and the other behind you, rotating gently from the base of the spine upward. Unravel on the inhale and twist to the other side.",cues:"Grow tall on each inhale; turn a little more on each exhale.",dosage:{sets:1,reps:"4 / side",hold:0,freq:""}},{id:k(),name:"Windshield Wiper Legs",effect:"stretch",style:"yoga",areas:["Hips","Low back"],muscles:["Outer hip","Inner thigh","Lower back"],videoUrl:"",description:"On your back or propped on the forearms, knees bent and feet wide, let both knees sway side to side like wipers, releasing the hips and low back.",cues:"Let the knees fall with gravity; keep the movement easy and rhythmic.",dosage:{sets:1,reps:"10",hold:0,freq:""}},{id:k(),name:"Thread the Needle",effect:"stretch",style:"yoga",bothSides:!0,areas:["Shoulders","Upper back"],muscles:["Upper back","Shoulders","Chest"],videoUrl:"",description:"From tabletop, reach one arm to the ceiling, then thread it under the opposite arm, lowering that shoulder and ear to the mat for a gentle upper-back twist. Optional: extend the opposite leg straight. Switch sides.",cues:"Keep the hips stacked over the knees; soften into the supporting shoulder.",dosage:{sets:1,reps:"",hold:30,freq:""}},{id:k(),name:"Downward Dog with Bent Knees",effect:"stretch",style:"yoga",areas:["Shoulders","Full body","Wrists & hands"],muscles:["Shoulders","Lats","Hamstrings","Calves"],videoUrl:"",description:"From tabletop, tuck the toes and lift the hips up and back into an inverted V, keeping the knees generously bent so the pelvis can tip forward and the spine lengthen fully.",cues:"Press through thumb and index finger; sit bones reach for the ceiling. Skip with uncontrolled high blood pressure or wrist pain.",dosage:{sets:1,reps:"",hold:30,freq:""}},{id:k(),name:"Rag Doll (Supported Forward Hang)",effect:"stretch",style:"yoga",areas:["Low back","Full body"],muscles:["Hamstrings","Lower back"],videoUrl:"",description:"Standing with feet hip-width and knees soft, fold forward and let the head and arms hang heavy, holding opposite elbows and swaying gently side to side.",cues:"Knees stay bent; the neck releases completely. Roll up slowly, one vertebra at a time.",dosage:{sets:1,reps:"",hold:45,freq:""}},{id:k(),name:"Mountain Pose (Tadasana)",effect:"strengthen",style:"yoga",areas:["Full body","Ankles & feet"],muscles:["Core","Glutes"],videoUrl:"",description:"Stand with the feet grounded, weight even through all four corners, spine tall, shoulders relaxed, crown reaching skyward \u2014 the home base of all standing poses.",cues:"Imagine a string lifting the crown; let the breath be quiet and even.",dosage:{sets:1,reps:"",hold:30,freq:""}},{id:k(),name:"Prayer Pose (Anjali Mudra)",effect:"stretch",style:"yoga",areas:["Full body"],muscles:["Shoulders","Chest"],videoUrl:"",description:"Standing tall, bring the palms together at the heart center with the shoulders soft \u2014 a moment to center and reconnect with the breath.",cues:"Light pressure between the palms; lengthen the back of the neck.",dosage:{sets:1,reps:"",hold:20,freq:""}},{id:k(),name:"Lat Pull-Downs (Standing)",effect:"strengthen",style:"yoga",areas:["Shoulders","Upper back"],muscles:["Lats","Upper back","Shoulders"],videoUrl:"",description:"Reach both arms overhead, then exhale and draw the elbows down toward the ribs as if pulling a bar, squeezing the shoulder blades down and together. Inhale to reach back up.",cues:"Ribs stay soft; the squeeze comes from between the shoulder blades.",dosage:{sets:1,reps:"10",hold:0,freq:""}},{id:k(),name:"Rowing (Standing)",effect:"strengthen",style:"yoga",areas:["Upper back","Shoulders"],muscles:["Upper back","Lats","Shoulders"],videoUrl:"",description:"Extend both arms forward at shoulder height, then exhale and draw the elbows straight back past the ribs, squeezing between the shoulder blades as if rowing. Inhale to reach forward again.",cues:"Stand tall throughout; keep the shoulders away from the ears.",dosage:{sets:1,reps:"10",hold:0,freq:""}},{id:k(),name:"Wrist Rolls",effect:"stretch",style:"yoga",areas:["Full body","Wrists & hands"],muscles:["Forearms & wrists"],videoUrl:"",description:"Circle the wrists slowly in both directions, fingers spread or hands in loose fists, mobilizing the forearms and wrists before weight-bearing poses.",cues:"Slow circles, full range, no forcing.",dosage:{sets:1,reps:"8 / direction",hold:0,freq:""}},{id:k(),name:"Standing Side Stretch (Parsva Tadasana)",effect:"stretch",style:"yoga",bothSides:!0,areas:["Full body","Upper back"],muscles:["Obliques","Lats"],videoUrl:"",description:"From Mountain, reach both arms overhead, clasp one wrist, and lean gently to the side, lengthening the whole side body from heel to fingertips. Variation: cross one foot behind the other to deepen the stretch. Switch sides.",cues:"Reach up and over rather than collapsing sideways; both feet stay grounded.",dosage:{sets:1,reps:"",hold:60,freq:""}},{id:k(),name:"Standing Forward Fold (Uttanasana)",effect:"stretch",style:"yoga",areas:["Low back","Hips"],muscles:["Hamstrings","Lower back","Calves"],videoUrl:"",description:"From standing, hinge at the hips and fold forward with soft knees, letting the spine and head release toward the floor.",cues:"Bend the knees as much as needed; let gravity do the work.",dosage:{sets:1,reps:"",hold:30,freq:""}},{id:k(),name:"Half Forward Fold (Ardha Uttanasana)",effect:"strengthen",style:"yoga",areas:["Low back"],muscles:["Lower back","Upper back","Hamstrings"],videoUrl:"",description:"From a forward fold, inhale and lift the torso halfway, hands to the shins or thighs, lengthening the spine to a flat back; exhale to release back down.",cues:"Lead with the crown; the back of the neck stays long.",dosage:{sets:1,reps:"3",hold:0,freq:""}},{id:k(),name:"Equestrian Pose (Low Lunge)",effect:"stretch",style:"yoga",bothSides:!0,areas:["Hips"],muscles:["Hip flexors","Quadriceps"],videoUrl:"",description:"Step one foot forward into a deep lunge with the back knee lowered, hips sinking forward and down to stretch the front of the rear hip. Arm variations: cactus arms to open the chest, or hands clasped behind the back. Switch sides.",cues:"Front knee over the ankle; lift the chest as the hips settle.",dosage:{sets:1,reps:"",hold:45,freq:""}},{id:k(),name:"Extended Puppy Pose",effect:"stretch",style:"yoga",areas:["Shoulders","Upper back","Chest"],muscles:["Shoulders","Chest","Lats","Upper back"],videoUrl:"",description:"From tabletop, walk the hands forward and melt the chest toward the mat while the hips stay over the knees \u2014 a blend of Child's Pose and Down Dog that opens the shoulders and upper back.",cues:"Forehead or chin rests lightly; reach through the fingertips.",dosage:{sets:1,reps:"",hold:45,freq:""}},{id:k(),name:"Standing Back Bend (Anuvittasana)",effect:"stretch",style:"yoga",areas:["Low back","Full body","Chest"],muscles:["Chest","Lower back","Hip flexors"],videoUrl:"",description:"Hands to the low back or sweeping overhead, lift the chest and arch gently back, lengthening up and over rather than crunching into the low back.",cues:"Lift before you lean; press the hips slightly forward and keep the breath easy.",dosage:{sets:1,reps:"",hold:15,freq:""}},{id:k(),name:"Warrior I (Open Heart)",effect:"strengthen",style:"yoga",bothSides:!0,areas:["Hips","Full body","Chest","Ankles & feet"],muscles:["Quadriceps","Glutes","Chest","Shoulders"],videoUrl:"",description:"Lunge stance with the front knee bent toward 90\xB0, back foot grounded at an angle, hips squared forward; the arms sweep up as the chest lifts and opens. Switch sides.",cues:"Press through the outer edge of the back foot; shoulders stay soft as the arms rise.",dosage:{sets:1,reps:"",hold:30,freq:""}},{id:k(),name:"Devotional Warrior",effect:"strengthen",style:"yoga",bothSides:!0,areas:["Hips","Shoulders","Chest"],muscles:["Quadriceps","Glutes","Shoulders","Chest"],videoUrl:"",description:"From Warrior I, clasp the hands behind the back, lift the chest, then bow forward inside the front leg, letting the arms float away from the back \u2014 strength and surrender in one shape. Switch sides.",cues:"Back leg stays strong; lengthen the chest forward before folding.",dosage:{sets:1,reps:"",hold:30,freq:""}},{id:k(),name:"Standing Quad Stretch",effect:"stretch",style:"yoga",bothSides:!0,areas:["Knees","Hips","Ankles & feet"],muscles:["Quadriceps","Hip flexors"],videoUrl:"",description:"Standing on one leg, bend the other knee and draw the heel toward the seat with your hand, the opposite arm raised for balance. Keep the knees close together and the pelvis neutral. Switch sides.",cues:"Gentle and gradual \u2014 never force the heel. Use a wall or chair for balance.",dosage:{sets:1,reps:"",hold:60,freq:""}},{id:k(),name:"Dancer's Pose (Natarajasana)",effect:"strengthen",style:"yoga",bothSides:!0,areas:["Hips","Full body","Chest","Ankles & feet"],muscles:["Quadriceps","Chest","Shoulders","Core"],videoUrl:"",description:"From Mountain, fix your gaze on a steady point, catch the inside of one ankle behind you, and press the foot into the hand as the chest reaches forward and lifts. Switch sides.",cues:"The press of foot into hand creates the shape; keep the standing leg strong.",dosage:{sets:1,reps:"",hold:15,freq:""}},{id:k(),name:"Camel Pose (Ustrasana)",effect:"stretch",style:"yoga",areas:["Low back","Hips","Chest"],muscles:["Chest","Hip flexors","Quadriceps","Lower back"],videoUrl:"",description:"Kneeling upright, hands supporting the low back (or reaching toward the heels), lift the chest skyward and arch back, lengthening the spine and engaging the core throughout.",cues:"Hips stay forward over the knees; rise out of the pose slowly, chin last.",dosage:{sets:1,reps:"",hold:20,freq:""}},{id:k(),name:"Cow Face Arms (Gomukhasana, with Strap)",effect:"stretch",style:"yoga",bothSides:!0,areas:["Shoulders"],muscles:["Shoulders","Chest","Upper trapezius"],videoUrl:"",description:"One arm reaches up and bends behind the head; the other bends low behind the back. Walk the hands toward each other along a strap or towel until a comfortable shoulder stretch is felt. Switch sides.",cues:"Ribs stay soft and the head upright \u2014 don't let the top elbow push the head forward.",dosage:{sets:1,reps:"",hold:30,freq:""}},{id:k(),name:"Cobra Pose (Bhujangasana)",effect:"strengthen",style:"yoga",areas:["Low back","Upper back","Chest"],muscles:["Lower back","Chest","Glutes"],videoUrl:"",description:"Lying prone with the hands under the shoulders, press lightly to lift the chest, keeping the elbows in and the shoulders away from the ears \u2014 a gentle, active backbend.",cues:"Lift comes from the back muscles, not the arms; legs stay heavy.",dosage:{sets:1,reps:"3",hold:10,freq:""}},{id:k(),name:"Locust Pose (Salabhasana)",effect:"strengthen",style:"yoga",areas:["Low back","Upper back"],muscles:["Lower back","Glutes","Upper back","Hamstrings"],videoUrl:"",description:"Lying prone with the arms alongside the body, exhale and lift the chest, arms, and legs away from the floor, lengthening through the crown and the toes.",cues:"Reach long rather than high; keep the back of the neck in line with the spine.",dosage:{sets:1,reps:"3",hold:10,freq:""}},{id:k(),name:"Hero's Pose (Virasana)",effect:"stretch",style:"yoga",areas:["Knees","Hips","Ankles & feet"],muscles:["Quadriceps","Calves"],videoUrl:"",description:"Kneel and sit between (or on) the heels with a block or cushion underneath as needed, spine tall, tops of the feet pressing down.",cues:"Use props generously; skip or elevate the seat with any knee pain.",dosage:{sets:1,reps:"",hold:60,freq:""}},{id:k(),name:"Kneeling Back Bend",effect:"stretch",style:"yoga",areas:["Low back","Chest"],muscles:["Chest","Hip flexors","Lower back"],videoUrl:"",description:"From upright kneeling, hands to the low back, lift the chest and arch gently up and back \u2014 a softer cousin of Camel Pose.",cues:"Support the low back with the hands; lift the heart rather than dropping the head.",dosage:{sets:1,reps:"",hold:15,freq:""}},{id:k(),name:"Lifted Hero Pose",effect:"strengthen",style:"yoga",areas:["Knees","Hips"],muscles:["Quadriceps","Hip flexors","Core"],videoUrl:"",description:"From Hero's Pose, rise to upright kneeling with the hips lifted over the knees, arms reaching forward or up, engaging the thighs and lengthening the front body.",cues:"Tailbone gently down; reach through the fingertips as the thighs work.",dosage:{sets:1,reps:"",hold:20,freq:""}},{id:k(),name:"Revolved Seated Spine Twist",effect:"stretch",style:"yoga",bothSides:!0,areas:["Low back","Upper back"],muscles:["Obliques","Lower back","Upper back","Glutes"],videoUrl:"",description:"Seated with one knee bent and crossed over the extended leg, hug the knee and rotate the torso toward it, lengthening tall on each inhale and easing deeper on each exhale. Switch sides.",cues:"The twist spirals up from the base of the spine; keep both sit bones grounded.",dosage:{sets:1,reps:"",hold:60,freq:""}},{id:k(),name:"Figure-Four Bridge",effect:"strengthen",style:"yoga",bothSides:!0,areas:["Hips"],muscles:["Glutes","Piriformis","Hamstrings"],videoUrl:"",description:"From a Bridge setup, cross one ankle over the opposite knee, then press through the grounded foot to lift the hips, keeping the pelvis level. Lower with control and switch sides.",cues:"Drive evenly through the standing foot; the lifted hip stays square.",dosage:{sets:1,reps:"8 / side",hold:3,freq:""}},{id:k(),name:"Supine Spinal Twist",effect:"stretch",style:"yoga",bothSides:!0,areas:["Low back"],muscles:["Obliques","Lower back","Glutes"],videoUrl:"",description:"On your back, draw one knee across the body toward the floor, arms wide, gaze turning gently the opposite way. Switch sides.",cues:"Both shoulders stay heavy; let the knee hover on a cushion if it doesn't reach.",dosage:{sets:1,reps:"",hold:60,freq:""}},{id:k(),name:"Fish Pose (Matsyasana)",effect:"stretch",style:"yoga",areas:["Upper back","Neck","Chest"],muscles:["Chest","Neck","Upper back"],videoUrl:"",description:"Lying back over the forearms or a low bolster, lift and open the chest, letting the head rest lightly \u2014 a counterpose that opens the front of the neck and chest.",cues:"Keep the weight out of the head; props make this pose kinder.",dosage:{sets:1,reps:"",hold:30,freq:""}},{id:k(),name:"Resting Half Frog",effect:"stretch",style:"yoga",bothSides:!0,areas:["Hips","Knees"],muscles:["Hip flexors","Inner thigh","Quadriceps"],videoUrl:"",description:"Lying on the belly, bend one knee and draw the foot out to the side, heel toward the seat :root{
  color-scheme: light;
  --ink:#25332C; --paper:#F2F4EE; --card:#FFFFFF; --line:#DDE3D9;
  --pine:#1E5743; --sage:#5E8A6E; --muted:#6B7A70;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink)}
.app{min-height:100vh;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5}
.wrap{max-width:980px;margin:0 auto;padding:20px 18px 80px}

/* header */
.topbar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:16px 22px;background:var(--card);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{font-size:26px;color:var(--pine)}
.topbar h1{font-family:var(--serif);font-size:21px;font-weight:600;margin:0;letter-spacing:.2px}
.tagline{margin:0;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sage)}
.tabs{display:flex;gap:8px;margin-left:auto}
.tab{border:1px solid var(--line);background:transparent;color:var(--ink);padding:8px 14px;border-radius:999px;cursor:pointer;font-size:14px}
.tab.on{background:var(--pine);border-color:var(--pine);color:#fff}
.count{opacity:.65;margin-left:4px;font-size:12px}
.savestate{font-size:12px;color:var(--muted);min-width:70px;text-align:right}
.savestate.error{color:#A33}

/* toolbar / chips */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:14px 0}
.search{flex:1;min-width:180px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:var(--card)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:5px 11px;border-radius:999px;font-size:12.5px;cursor:pointer}
.chip.on{background:var(--pine);border-color:var(--pine);color:#fff}

/* buttons */
.btn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:8px 14px;border-radius:8px;font-size:14px;cursor:pointer}
.btn.primary{background:var(--pine);border-color:var(--pine);color:#fff}
.btn.primary:disabled{opacity:.45;cursor:not-allowed}
.btn.ghost{background:transparent}
.btn.danger{color:#9B3030;border-color:#D8B5B5}
.btn.small{padding:5px 10px;font-size:13px}
.icon{border:none;background:transparent;cursor:pointer;font-size:15px;color:var(--muted);padding:4px 6px;border-radius:6px}
.icon:hover{background:var(--paper)}
.btn:focus-visible,.chip:focus-visible,.tab:focus-visible,.icon:focus-visible{outline:2px solid var(--pine);outline-offset:2px}

/* cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:0}
.card-head{display:flex;align-items:flex-start;gap:8px}
.card h3{font-family:var(--serif);font-size:17px;font-weight:600;margin:0 0 2px;flex:1}
.cat{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;margin:2px 0 8px;font-weight:600}
.muscles-line{font-size:12.5px;color:var(--muted);margin:0 0 8px}
.style-tag{font-weight:600}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.desc{margin:0 0 8px;font-size:14px}
.cues{margin:0 0 8px;font-size:13px;color:var(--muted);font-style:italic}
.rx{font-family:var(--serif);font-size:14px;color:var(--pine);border-top:1px dashed var(--line);padding-top:8px;margin:6px 0 0;font-variant:small-caps;letter-spacing:.04em}
.rx.big{font-size:16px;border:none;padding:0;margin:2px 0 8px}
.plan-card{cursor:pointer}
.plan-card:hover{border-color:var(--pine)}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.empty{color:var(--muted);font-style:italic;padding:18px 4px}
.h2{font-family:var(--serif);font-size:19px;margin:0;flex:0}
.h3{font-family:var(--serif);font-size:15px;margin:14px 0 6px;font-weight:600}

/* forms */
.fl{display:flex;flex-direction:column;gap:5px;font-size:13px;color:var(--muted);margin-bottom:12px}
.fl input,.fl textarea,.fl select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;color:var(--ink);background:var(--card);font-family:var(--sans)}
.plan-head{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;margin-bottom:8px}
.plan-head .wide{grid-column:1/-1}
.dose-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:8px 0 10px}
.dose-row-3{grid-template-columns:repeat(3,1fr)}
.bothsides-row{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--ink);margin:4px 0 0;cursor:pointer}
.bothsides-row input{width:17px;height:17px;accent-color:#1E5743;cursor:pointer}
.dose-row label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted)}
.dose-row input{padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:14px;width:100%}

/* plan items */
.item{margin-bottom:12px}
.item-head{display:flex;align-items:flex-start;gap:10px}
.item-num{font-family:var(--serif);color:var(--pine);font-size:17px}
.item-title{flex:1}
.item-title h3{margin:0}
.item-actions{display:flex;gap:2px}

/* schedule */
.days-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin:2px 0 8px}
.days-label{font-size:12px;color:var(--muted);margin-right:2px}
.daychip{width:26px;height:26px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:11.5px;cursor:pointer;padding:0}
.daychip.on{background:var(--pine);border-color:var(--pine);color:#fff}
.daychip:focus-visible{outline:2px solid var(--pine);outline-offset:2px}
.donetoday{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);margin-left:auto;cursor:pointer}
.donetoday input{width:16px;height:16px;accent-color:#1E5743;cursor:pointer}
.week-summary{margin-bottom:14px}
.startdate{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--muted);margin-top:12px;max-width:200px}
.startdate input{padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:14px;color:var(--ink);background:var(--card);font-family:var(--sans)}
.weeknav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.weeklabel{font-family:var(--serif);font-size:16px}
.progressbar{height:8px;background:var(--line);border-radius:99px;margin-top:10px;overflow:hidden}
.progressfill{height:100%;background:var(--pine);border-radius:99px;transition:width .3s ease}
.weekgrid-card{overflow-x:auto;padding:14px}
.weekgrid{border-collapse:collapse;width:100%;min-width:560px}
.weekgrid th,.weekgrid td{text-align:center;padding:7px 4px;font-size:12.5px}
.weekgrid thead th{color:var(--muted);font-weight:600;border-bottom:1px solid var(--line)}
.day-name{display:block}
.day-date{display:block;font-weight:400;font-size:11px}
.exname-col{text-align:left!important;max-width:220px}
.exname-col .exname{font-size:13.5px}
.exname-col .dot{display:inline-block;margin-right:7px;vertical-align:middle}
.today-col{background:rgba(30,87,67,.07);border-radius:6px}
.offday{color:var(--line);font-size:16px}
.checkcell{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--sage);background:var(--card);color:#fff;font-size:15px;cursor:pointer;padding:0;line-height:1}
.checkcell.checked{background:var(--pine);border-color:var(--pine)}
.checkcell.future{border-style:dashed;opacity:.4;cursor:not-allowed}
.checkcell:not(.future):hover{border-color:var(--pine)}
.checkcell:focus-visible{outline:2px solid var(--pine);outline-offset:2px}
.grid-hint{margin:10px 2px 0}

/* photos */
.ex-photo{width:100%;max-height:210px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:8px;margin:0 0 10px;display:block}
.sheet-photo{float:right;width:175px;max-height:240px;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:8px;margin:0 0 10px 16px}
.sheet-item{overflow:hidden}
.img-preview{display:flex;align-items:center;gap:12px}
.img-preview img{width:96px;height:96px;object-fit:cover;border-radius:8px;border:1px solid var(--line);background:#fff}
.upload-btn{display:inline-block;cursor:pointer;width:fit-content;margin-top:6px}

/* guided practice */
.practice{max-width:720px}
.pr-count{font-family:var(--serif);font-size:15px;color:var(--muted)}
.pr-progress{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:14px}
.pr-progress-fill{height:100%;background:var(--pine);border-radius:99px;transition:width .25s ease}
.pr-section{font-family:var(--serif);font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);margin:0 0 8px;text-align:center}
.pr-card{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:14px;padding:24px 26px;text-align:center}
.pr-name{font-family:var(--serif);font-size:27px;font-weight:600;margin:0 0 6px;color:var(--ink)}
.pr-meta{font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin:0 0 6px}
.pr-rx{font-family:var(--serif);font-size:18px;color:var(--pine);font-variant:small-caps;letter-spacing:.04em;margin:0 0 18px}
.video-native video{display:block;width:100%;max-height:46vh;border-radius:10px;background:#000;margin:0 0 12px}
.pr-audio{display:flex;align-items:center;gap:10px;margin:0 0 14px}
.pr-audio-label{font-size:13px;font-weight:600;color:var(--sage);white-space:nowrap}
.pr-audio audio{flex:1;height:36px}
.card-audio{width:100%;height:32px;margin-top:8px}
.pr-kind{display:inline-block;font-family:var(--sans,sans-serif);font-variant:normal;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--sage);border:1px solid var(--line);border-radius:99px;padding:2px 10px;margin-right:10px;vertical-align:2px}
.pr-kind.move{color:#B0762E;border-color:#B0762E}
.pr-intro-list{max-width:440px;margin:6px auto 0;text-align:left}
.pr-intro-row{display:flex;justify-content:space-between;gap:16px;padding:7px 2px;border-bottom:1px solid var(--line);font-size:15px}
.pr-intro-row:last-child{border-bottom:none}
.pr-video{margin:0 auto 16px;max-width:440px}
.pr-photos{display:flex;gap:10px;justify-content:center;margin:0 0 16px}
.pr-photo{display:block;width:100%;max-width:440px;max-height:38vh;object-fit:contain;background:#fff;border:1px solid var(--line);border-radius:10px;margin:0 auto 16px}
.pr-photo.half{width:calc(50% - 5px);max-width:330px;margin:0}
.pr-timer{display:flex;flex-direction:column;align-items:center;gap:6px;margin:6px 0 18px}
.pr-timer-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.pr-timer-controls{display:flex;align-items:center;gap:12px}
.pr-clock{font-family:var(--serif);font-size:40px;color:var(--ink);min-width:108px;font-variant-numeric:tabular-nums;text-align:center}
.pr-clock.ready{color:var(--gold);font-size:52px}
.pr-clock.run{color:var(--pine)}
.pr-clock.rest{color:var(--sage)}
.pr-clock.done{color:var(--gold)}
.pr-timer-label.rest{color:var(--sage)}
.pr-autoplay{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:16px}
.pr-play{padding:12px 22px;font-size:15px}
.pr-rest{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
.pr-rest input{width:56px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:14px;text-align:center}
.pr-versions{background:#F4F7F1;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:0 0 16px}
.pr-versions-label{display:block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.pr-version-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.pr-version-btn{border:1.5px solid var(--sage);background:var(--card);color:var(--sage);padding:9px 16px;border-radius:999px;font-size:14px;cursor:pointer}
.pr-version-btn.main{border-color:var(--pine);color:var(--pine)}
.pr-version-btn:hover{background:var(--sage);color:#fff}
.pr-version-btn.main:hover{background:var(--pine)}
.pr-autoread{display:none}
.pr-addons{background:#FBF6EF;border:1px solid #E8D9C2;border-radius:10px;padding:12px 14px;margin:0 0 16px}
.pr-addon-btn{border:1.5px dashed var(--gold);background:var(--card);color:var(--gold);padding:9px 16px;border-radius:999px;font-size:14px;cursor:pointer}
.pr-addon-btn.on{background:var(--gold);color:#fff;border-style:solid}
.pr-addon-btn:hover{border-style:solid}
.pr-benefits{font-size:15px;line-height:1.6;text-align:left;margin:0 0 10px;color:var(--ink)}
.pr-rolebar{display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;margin:0 0 0;padding:10px 16px;border-radius:12px 12px 0 0}
.pr-rolebar.alt{background:var(--sage)}
.pr-rolebar.addon{background:var(--gold)}
.pr-rolebar-icon{font-size:17px}
.pr-desc{font-size:15.5px;line-height:1.6;text-align:left;margin:0 0 10px}
.pr-cues{font-size:14px;color:var(--muted);font-style:italic;text-align:left;margin:0 0 10px}
.pr-done{margin-top:8px;border:1.5px solid var(--pine);background:var(--card);color:var(--pine);padding:11px 22px;border-radius:10px;font-size:15px;cursor:pointer}
.pr-done.is-done{background:var(--pine);color:#fff}
.pr-done:focus-visible{outline:2px solid var(--pine);outline-offset:2px}
.pr-nav{display:flex;gap:12px;margin-top:18px}
.pr-move{flex:1;padding:14px;font-size:16px}
.pr-move:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:560px){
  .pr-name{font-size:23px}
  .pr-photo{max-height:32vh}
  .pr-clock{font-size:34px}
}

/* sequence sections & presets */
.item-linked{margin-left:26px;background:#FAFBF8}
.role-badge{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:6px;white-space:nowrap;align-self:flex-start}
.role-badge.alt{color:var(--sage);background:rgba(94,138,110,.12)}
.role-badge.addon{color:var(--gold);background:rgba(176,118,46,.12)}
.link-add{display:flex;gap:8px;margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
.sheet-item-linked{margin-left:24px;background:#FAFBF8}
.sheet-role{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--sage)}
.seq-section{font-family:var(--serif);font-size:14px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);margin:20px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--line)}
.sheet-section{page-break-after:avoid}
.preset-row{display:flex;align-items:flex-start;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line)}
.preset-row .btn{flex:none;margin-top:2px}

/* history */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-num{font-family:var(--serif);font-size:26px;color:var(--pine);line-height:1.1}
.stat-label{font-size:10.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;text-align:center}
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cal-month{font-family:var(--serif);font-size:18px;flex:1;text-align:center}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);padding:2px 0}
.cal-cell{min-height:48px;border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:var(--card)}
.cal-cell .dnum{font-size:10.5px;color:var(--muted)}
.cal-cell .frac{font-size:12.5px;font-weight:600;color:var(--ink)}
.cal-cell.out{visibility:hidden}
.cal-cell.dim{opacity:.35}
.cal-cell.rest .frac{color:var(--line);font-size:16px;line-height:.6}
.cal-cell.full{background:var(--pine);border-color:var(--pine)}
.cal-cell.full .dnum,.cal-cell.full .frac{color:#fff}
.cal-cell.today{box-shadow:0 0 0 2px var(--pine)}
.exbar-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line)}
.exbar-row:last-of-type{border-bottom:none}
.exbar-name{flex:0 0 34%;font-size:13.5px}
.exbar-track{flex:1;height:9px;background:var(--line);border-radius:99px;overflow:hidden}
.exbar-fill{height:100%;background:var(--pine);border-radius:99px}
.exbar-pct{width:42px;text-align:right;font-size:13px;font-weight:600;color:var(--pine)}
.exbar-count{width:46px;text-align:right}

/* picker / modal */
.overlay{position:fixed;inset:0;background:rgba(37,51,44,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
.modal{background:var(--card);border-radius:12px;padding:22px;max-width:560px;width:100%;max-height:88vh;overflow:auto}
.modal-actions{display:flex;gap:10px;margin-top:14px}
.pick-list{margin-top:12px}
.pick-row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--line)}
.pick-name{flex:1}
.dot{width:10px;height:10px;border-radius:50%;flex:none}

/* video */
.video{position:relative;width:100%;aspect-ratio:16/9;margin-top:10px}
.video iframe{position:absolute;inset:0;width:100%;height:100%;border-radius:8px}
.video-alt{margin-top:6px}
.vidctl{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:8px}
.vbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);padding:5px 10px;border-radius:7px;font-size:12.5px;cursor:pointer;line-height:1.2;text-decoration:none}
.vbtn:hover{border-color:var(--pine);color:var(--pine)}
.vbtn:focus-visible{outline:2px solid var(--pine);outline-offset:2px}
.vlink{color:var(--muted)}
.vsep{width:1px;height:18px;background:var(--line);margin:0 3px}
.vjump{width:64px;padding:5px 8px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;text-align:center}
.video-link{position:relative;display:block;margin-top:10px;border-radius:8px;overflow:hidden;line-height:0}
.video-link img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}
.play-badge{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:rgba(37,51,44,.85);color:#fff;padding:9px 16px;border-radius:999px;font-size:13px;line-height:1.2;white-space:nowrap}
.video-link:hover .play-badge{background:var(--pine)}

/* plan sheet */
.sheet-head{border-bottom:2px solid var(--pine);padding-bottom:14px;margin-bottom:18px}
.sheet-head h1{font-family:var(--serif);font-size:28px;margin:0 0 2px}
.sheet-notes{margin:10px 0 0;font-size:14.5px}
.sheet-freq{margin:8px 0 0;font-size:14.5px;font-weight:600;color:var(--pine)}
.pr-sides{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:0 0 18px}
.pr-sides-label{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gold)}
.pr-side{border:1.5px solid var(--gold);background:var(--card);color:var(--gold);padding:7px 18px;border-radius:999px;font-size:14px;cursor:pointer}
.pr-side.on{background:var(--gold);color:#fff}
.pr-side:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.sheet-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 20px;margin-bottom:14px;page-break-inside:avoid}
.sheet-item-head h2{font-family:var(--serif);font-size:19px;margin:0}
.sheet-item p{margin:6px 0;font-size:14.5px}
.sheet-foot{margin-top:22px;font-size:13px;color:var(--muted);border-top:1px dashed var(--line);padding-top:12px}

@media(max-width:640px){
  .dose-row{grid-template-columns:repeat(2,1fr)}
  .plan-head{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .exbar-name{flex-basis:42%}
  .exbar-count{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
@media print{
  .noprint{display:none!important}
  .app{background:#fff}
  .wrap{padding:0;max-width:100%}
  .sheet-item{border:1px solid #ccc}
}
